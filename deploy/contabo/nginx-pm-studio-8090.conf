# PM Studio — nginx reverse proxy (port 8090)
# Install: sudo cp deploy/contabo/nginx-pm-studio-8090.conf /etc/nginx/sites-available/pm-studio-8090
# Enable:  sudo ln -sf /etc/nginx/sites-available/pm-studio-8090 /etc/nginx/sites-enabled/
# Test:    sudo nginx -t && sudo systemctl reload nginx

server {
    listen 8090;
    listen [::]:8090;
    server_name 185.185.80.147;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8005/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /health {
        proxy_pass http://127.0.0.1:8005/health;
    }
}
