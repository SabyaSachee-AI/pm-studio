version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pmstudio
      POSTGRES_USER: pmstudio
      POSTGRES_PASSWORD: devpassword123
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pmstudio"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads

  celery-worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    # Default queue: PRD/SRS/architecture/spec/etc. (concurrency 2 — no head-of-line block)
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=2 -Q celery
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads

  celery-build-worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    # Never run more than one replica — duplicate build workers cause GitHub 422 push races.
    # Dedicated queue for long code-build jobs (concurrency 3 — projects don't block each other)
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=3 -Q build -n build@%h
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  pg_data:
